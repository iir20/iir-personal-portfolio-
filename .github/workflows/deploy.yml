name: CI/CD Production Build & GitHub Pages Deploy

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

# Cancel duplicate workflows in progress
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build, Audit & Publish
    steps:
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Restore & Install Dependencies
        run: npm ci

      - name: 🛠️ Run TypeScript Validation Check
        run: npm run lint

      - name: 🏗️ Compile & Bundle Production Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: 🗺️ Generate Dynamic Sitemap & SEO Index
        run: |
          mkdir -p ./dist
          echo '<?xml version="1.0" encoding="UTF-8"?>' > ./dist/sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> ./dist/sitemap.xml
          echo '  <url>' >> ./dist/sitemap.xml
          echo '    <loc>https://im-ismail-ibne-ratul.github.io/</loc>' >> ./dist/sitemap.xml
          echo '    <lastmod>'$(date +%Y-%m-%d)'</lastmod>' >> ./dist/sitemap.xml
          echo '    <changefreq>weekly</changefreq>' >> ./dist/sitemap.xml
          echo '    <priority>1.0</priority>' >> ./dist/sitemap.xml
          echo '  </url>' >> ./dist/sitemap.xml
          echo '  <url>' >> ./dist/sitemap.xml
          echo '    <loc>https://im-ismail-ibne-ratul.github.io/admin-deck</loc>' >> ./dist/sitemap.xml
          echo '    <lastmod>'$(date +%Y-%m-%d)'</lastmod>' >> ./dist/sitemap.xml
          echo '    <changefreq>monthly</changefreq>' >> ./dist/sitemap.xml
          echo '    <priority>0.5</priority>' >> ./dist/sitemap.xml
          echo '  </url>' >> ./dist/sitemap.xml
          echo '</urlset>' >> ./dist/sitemap.xml
          echo "✅ Sitemap.xml generated successfully inside production bundle!"

      - name: ⚙️ Verify Build Output Integrity
        run: |
          if [ ! -f "./dist/index.html" ]; then
            echo "❌ BUILD FAILURE: index.html was not generated!"
            exit 1
          fi
          if [ ! -s "./dist/index.html" ]; then
            echo "❌ BUILD FAILURE: index.html is empty!"
            exit 1
          fi
          echo "✅ Build verified successfully! index.html is healthy (size: $(wc -c < ./dist/index.html) bytes)"

      - name: 📦 Optimize Static Assets for Host CDN
        run: |
          echo "=================================================="
          echo "OPTIMIZING STATIC ASSET ALLOCATIONS"
          echo "=================================================="
          echo "• Target Build Folder size: $(du -sh ./dist | cut -f1)"
          echo "• Compiling asset counts..."
          find ./dist -type f | wc -l | xargs -I {} echo "• Total Compiled Files: {}"
          echo "✅ Asset validation checks complete!"

      - name: 🚀 Deploy static assets to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
