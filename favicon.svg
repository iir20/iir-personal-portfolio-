<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Hexagonal Cyber Frame -->
  <rect width="512" height="512" rx="64" fill="#030305" stroke="#10b981" stroke-width="8" />
  
  <!-- Grid Matrix Lines -->
  <g stroke="#10b981" stroke-width="1" stroke-opacity="0.15">
    <line x1="64" y1="0" x2="64" y2="512" />
    <line x1="128" y1="0" x2="128" y2="512" />
    <line x1="192" y1="0" x2="192" y2="512" />
    <line x1="256" y1="0" x2="256" y2="512" />
    <line x1="320" y1="0" x2="320" y2="512" />
    <line x1="384" y1="0" x2="384" y2="512" />
    <line x1="448" y1="0" x2="448" y2="512" />
    
    <line x1="0" y1="64" x2="512" y2="64" />
    <line x1="0" y1="128" x2="512" y2="128" />
    <line x1="0" y1="192" x2="512" y2="192" />
    <line x1="0" y1="256" x2="512" y2="256" />
    <line x1="0" y1="320" x2="512" y2="320" />
    <line x1="0" y1="384" x2="512" y2="384" />
    <line x1="0" y1="448" x2="512" y2="448" />
  </g>

  <!-- Cyber Terminal Symbol (>_) -->
  <g filter="url(#glow)">
    <!-- Terminal prompt: ">" -->
    <path d="M120 140 L240 256 L120 372" fill="none" stroke="url(#neonGlow)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Cursor block: "_" -->
    <line x1="280" y1="372" x2="400" y2="372" stroke="url(#neonGlow)" stroke-width="32" stroke-linecap="round" />
  </g>

  <!-- Accent Status Dots -->
  <circle cx="432" cy="80" r="12" fill="#10b981" />
  <circle cx="432" cy="120" r="8" fill="#10b981" fill-opacity="0.5" />
  <circle cx="432" cy="150" r="6" fill="#10b981" fill-opacity="0.3" />
</svg>
